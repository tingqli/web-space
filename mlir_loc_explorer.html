<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLIR Loc 对照查看器</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --border: #2a3040;
      --text: #e6e8ef;
      --muted: #a2a9ba;
      --hover: #293149;
      --active: #2d4f8a;
      --active-peer: #2f3f63;
      --active-var-ref: #5a3e17;
      --accent: #7cb8ff;
      --syn-comment: #7e8aa3;
      --syn-keyword: #c792ea;
      --syn-op: #82aaff;
      --syn-ssa: #ffcb6b;
      --syn-type: #89ddff;
      --syn-attr: #f78c6c;
      --syn-number: #f2cdcd;
      --syn-string: #c3e88d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: #10131a;
      flex-wrap: wrap;
    }

    .toolbar label {
      font-size: 12px;
      color: var(--muted);
    }

    button,
    select {
      background: #1a2030;
      color: var(--text);
      border: 1px solid #34405a;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
    }

    button:hover,
    select:hover {
      border-color: #4f6288;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
    }

    .progress-wrap {
      display: none;
      width: 280px;
      align-items: center;
      gap: 8px;
    }

    .progress-wrap.show {
      display: inline-flex;
    }

    .progress-wrap progress {
      width: 170px;
      height: 10px;
    }

    .progress-text {
      color: var(--muted);
      font-size: 12px;
      min-width: 92px;
    }

    .panes {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    .pane {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .pane-title {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewer {
      flex: 1;
      overflow: auto;
      padding: 8px 0;
    }

    .line {
      display: grid;
      grid-template-columns: 56px auto;
      align-items: baseline;
      white-space: pre;
      line-height: 1.35;
      font-size: 12px;
      font-weight: 400;
      min-width: 100%;
      width: max-content;
    }

    .line:hover {
      background: var(--hover);
    }

    .line-no {
      color: #74809a;
      text-align: right;
      padding-right: 10px;
      user-select: none;
    }

    .line-code {
      padding-right: 8px;
      overflow: visible;
      font-weight: 400;
    }

    .line.active {
      background: var(--active);
    }

    .line.peer-active {
      background: var(--active-peer);
    }

    .line.var-ref-active {
      background: var(--active-var-ref);
    }

    .tok-comment {
      color: var(--syn-comment);
      font-weight: 400;
    }

    .tok-keyword {
      color: var(--syn-keyword);
      font-weight: 400;
    }

    .tok-op {
      color: var(--syn-op);
      font-weight: 400;
    }

    .tok-ssa {
      color: var(--syn-ssa);
      font-weight: 400;
    }

    .tok-type {
      color: var(--syn-type);
      font-weight: 400;
    }

    .tok-attr {
      color: var(--syn-attr);
      font-weight: 400;
    }

    .tok-number {
      color: var(--syn-number);
      font-weight: 400;
    }

    .tok-string {
      color: var(--syn-string);
      font-weight: 400;
    }

    .loc-tooltip {
      position: fixed;
      z-index: 1000;
      max-width: 540px;
      background: #10131a;
      color: var(--text);
      border: 1px solid #3a4766;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1.35;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
      pointer-events: none;
      white-space: pre-wrap;
      display: none;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="pickDirBtn">选择目录</button>
    <button id="importDirBtn">导入目录(兼容)</button>
    <input id="dirInput" type="file" webkitdirectory directory multiple hidden>

    <label for="leftFileSelect">左侧文件</label>
    <select id="leftFileSelect"></select>

    <label for="rightFileSelect">右侧文件</label>
    <select id="rightFileSelect"></select>

    <span id="progressWrap" class="progress-wrap">
      <progress id="loadProgress" value="0" max="100"></progress>
      <span id="progressText" class="progress-text">0%</span>
    </span>

    <span id="status" class="hint">先点击“选择目录”，选择含 mlir 文件的目录。鼠标悬停联动，单击可锁定。</span>
  </div>

  <div class="panes">
    <section class="pane">
      <div id="leftTitle" class="pane-title">左侧</div>
      <div id="leftViewer" class="viewer"></div>
    </section>
    <section class="pane">
      <div id="rightTitle" class="pane-title">右侧</div>
      <div id="rightViewer" class="viewer"></div>
    </section>
  </div>
  <div id="locTooltip" class="loc-tooltip"></div>

  <script>
    const state = {
      files: [],
      fileTextByName: new Map(),
      parsedByFile: new Map(),
      hover: null,
      locked: null,
      leftData: null,
      rightData: null,
    };

    const pickDirBtn = document.getElementById("pickDirBtn");
    const importDirBtn = document.getElementById("importDirBtn");
    const dirInput = document.getElementById("dirInput");
    const leftSelect = document.getElementById("leftFileSelect");
    const rightSelect = document.getElementById("rightFileSelect");
    const leftViewer = document.getElementById("leftViewer");
    const rightViewer = document.getElementById("rightViewer");
    const leftTitle = document.getElementById("leftTitle");
    const rightTitle = document.getElementById("rightTitle");
    const statusEl = document.getElementById("status");
    const progressWrap = document.getElementById("progressWrap");
    const loadProgress = document.getElementById("loadProgress");
    const progressText = document.getElementById("progressText");
    const locTooltip = document.getElementById("locTooltip");

    pickDirBtn.addEventListener("click", pickDirectory);
    importDirBtn.addEventListener("click", () => dirInput.click());
    dirInput.addEventListener("change", importDirectoryCompat);
    leftSelect.addEventListener("change", renderBoth);
    rightSelect.addEventListener("change", renderBoth);

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function syntaxHighlightMlirLine(line) {
      const tokenRe = /\/\/.*$|"(?:[^"\\]|\\.)*"|%[-A-Za-z0-9.$_]+(?:#[0-9]+)?|![A-Za-z0-9_.$<>?:(),* \-]+|#[A-Za-z_][A-Za-z0-9_.$]*|-?\b\d+(?:\.\d+)?\b|@[A-Za-z_.$][A-Za-z0-9_.$]*|\b(?:module|attributes|gpu\.module|gpu\.func|func\.func|kernel|loc|fused|unknown|return|async|in|blocks|threads|args)\b|[A-Za-z_][A-Za-z0-9_]*\.[A-Za-z0-9_]+/g;
      let out = "";
      let last = 0;
      let m;
      tokenRe.lastIndex = 0;

      while ((m = tokenRe.exec(line)) !== null) {
        const start = m.index;
        const tok = m[0];
        out += escapeHtml(line.slice(last, start));
        let cls = "";
        if (tok.startsWith("//")) {
          cls = "tok-comment";
        } else if (tok.startsWith("\"")) {
          cls = "tok-string";
        } else if (tok.startsWith("%")) {
          cls = "tok-ssa";
        } else if (tok.startsWith("!")) {
          cls = "tok-type";
        } else if (tok.startsWith("#") || tok.startsWith("@")) {
          cls = "tok-attr";
        } else if (/^-?\d/.test(tok)) {
          cls = "tok-number";
        } else if (tok.includes(".")) {
          if (/^(gpu\.module|gpu\.func|func\.func)$/.test(tok)) {
            cls = "tok-keyword";
          } else {
            cls = "tok-op";
          }
        } else {
          cls = "tok-keyword";
        }
        out += `<span class="${cls}">${escapeHtml(tok)}</span>`;
        last = tokenRe.lastIndex;
      }
      out += escapeHtml(line.slice(last));
      return out.length > 0 ? out : " ";
    }

    function setLoading(disabled) {
      pickDirBtn.disabled = disabled;
      importDirBtn.disabled = disabled;
      leftSelect.disabled = disabled;
      rightSelect.disabled = disabled;
    }

    function updateProgress(done, total, label = "") {
      const safeTotal = total > 0 ? total : 1;
      const percent = Math.min(100, Math.round((done / safeTotal) * 100));
      loadProgress.max = safeTotal;
      loadProgress.value = Math.min(done, safeTotal);
      progressText.textContent = label ? `${label} ${percent}%` : `${percent}%`;
    }

    function showProgress(total, label = "加载中") {
      progressWrap.classList.add("show");
      updateProgress(0, total, label);
      setLoading(true);
    }

    function hideProgress() {
      progressWrap.classList.remove("show");
      setLoading(false);
    }

    async function pickDirectory() {
      if (!window.showDirectoryPicker) {
        setStatus("当前浏览器不支持 showDirectoryPicker，可改用“导入目录(兼容)”。");
        return;
      }

      try {
        const dirHandle = await window.showDirectoryPicker();
        const entries = [];
        for await (const entry of dirHandle.values()) {
          if (entry.kind === "file" && entry.name.toLowerCase().endsWith(".mlir")) {
            entries.push(entry);
          }
        }

        const files = [];
        const fileTextByName = new Map();
        showProgress(entries.length, "读取");

        for (let i = 0; i < entries.length; i++) {
          const entry = entries[i];
          files.push(entry.name);
          const f = await entry.getFile();
          fileTextByName.set(entry.name, await f.text());
          updateProgress(i + 1, entries.length, "读取");
        }
        files.sort();
        state.files = files;
        state.fileTextByName = fileTextByName;
        state.parsedByFile.clear();

        if (files.length === 0) {
          fillSelect(leftSelect, []);
          fillSelect(rightSelect, []);
          leftViewer.innerHTML = "";
          rightViewer.innerHTML = "";
          setStatus("目录中没有 .mlir 文件。");
          hideProgress();
          return;
        }

        fillSelect(leftSelect, files, 0);
        fillSelect(rightSelect, files, files.length > 1 ? 1 : 0);
        await renderBoth();
        setStatus(`已加载目录，共 ${files.length} 个 .mlir 文件。`);
        hideProgress();
      } catch (err) {
        hideProgress();
        if (err && err.name === "AbortError") {
          setStatus("已取消选择目录。");
          return;
        }
        setStatus(`选择目录失败: ${err}`);
      }
    }

    async function importDirectoryCompat() {
      const selected = Array.from(dirInput.files || []);
      if (selected.length === 0) {
        setStatus("未选择目录。");
        return;
      }

      const mlirFiles = selected.filter((f) => f.name.toLowerCase().endsWith(".mlir"));
      if (mlirFiles.length === 0) {
        setStatus("所选目录中没有 .mlir 文件。");
        return;
      }

      const fileTextByName = new Map();
      const names = [];
      showProgress(mlirFiles.length, "读取");
      try {
        for (const f of mlirFiles) {
          names.push(f.name);
          fileTextByName.set(f.name, await f.text());
          updateProgress(names.length, mlirFiles.length, "读取");
        }
        names.sort();

        state.files = names;
        state.fileTextByName = fileTextByName;
        state.parsedByFile.clear();

        fillSelect(leftSelect, names, 0);
        fillSelect(rightSelect, names, names.length > 1 ? 1 : 0);
        await renderBoth();
        setStatus(`已导入目录，共 ${names.length} 个 .mlir 文件。`);
      } finally {
        hideProgress();
      }
    }

    function fillSelect(selectEl, files, selectedIdx = 0) {
      selectEl.innerHTML = "";
      files.forEach((name, idx) => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        if (idx === selectedIdx) {
          opt.selected = true;
        }
        selectEl.appendChild(opt);
      });
    }

    async function getParsed(fileName) {
      if (!fileName) {
        return null;
      }
      if (state.parsedByFile.has(fileName)) {
        return state.parsedByFile.get(fileName);
      }
      const text = state.fileTextByName.get(fileName);
      if (typeof text !== "string") {
        return null;
      }
      const parsed = parseMlir(text);
      state.parsedByFile.set(fileName, parsed);
      return parsed;
    }

    async function renderBoth() {
      if (state.fileTextByName.size === 0) {
        return;
      }
      const leftFile = leftSelect.value;
      const rightFile = rightSelect.value;
      const [leftData, rightData] = await Promise.all([getParsed(leftFile), getParsed(rightFile)]);

      leftTitle.textContent = leftFile || "左侧";
      rightTitle.textContent = rightFile || "右侧";

      state.hover = null;
      state.locked = null;
      state.leftData = leftData;
      state.rightData = rightData;
      renderPane(leftViewer, leftData, "left", rightData);
      renderPane(rightViewer, rightData, "right", leftData);
    }

    function parseMlir(text) {
      const lines = text.replace(/\r\n/g, "\n").split("\n");

      // #loc9 = loc("-":32:12)
      // #loc36 = loc(fused[#loc16, #loc12])
      // #loc3 = loc(unknown)
      const defs = new Map();
      const defLineRe = /^#(loc[0-9A-Za-z_]+)\s*=\s*loc\((.*)\)\s*$/;
      const directLineRe = /^"((?:[^"\\]|\\.)*)":(\d+):(\d+)$/;
      const refRe = /#(loc[0-9A-Za-z_]+)/g;

      for (const line of lines) {
        const m = line.match(defLineRe);
        if (!m) {
          continue;
        }
        const id = m[1];
        const raw = m[2].trim();
        const item = { type: "other", file: null, line: null, col: null, refs: [] };

        const dm = raw.match(directLineRe);
        if (dm) {
          item.type = "direct";
          item.file = dm[1];
          item.line = Number(dm[2]);
          item.col = Number(dm[3]);
        } else if (raw === "unknown") {
          item.type = "unknown";
        } else {
          let rm;
          refRe.lastIndex = 0;
          while ((rm = refRe.exec(raw)) !== null) {
            item.refs.push(rm[1]);
          }
          if (item.refs.length > 0) {
            item.type = "refs";
          }
        }
        defs.set(id, item);
      }

      function resolveLocLines(locId, visiting = new Set()) {
        if (!locId || visiting.has(locId)) {
          return new Set();
        }
        visiting.add(locId);
        const def = defs.get(locId);
        if (!def) {
          return new Set();
        }
        if (def.type === "direct" && typeof def.line === "number") {
          return new Set([def.line]);
        }
        if (def.type === "unknown") {
          return new Set();
        }
        const out = new Set();
        for (const ref of def.refs || []) {
          const child = resolveLocLines(ref, new Set(visiting));
          for (const lineNo of child) {
            out.add(lineNo);
          }
        }
        return out;
      }

      const codeLocRefRe = /loc\(#(loc[0-9A-Za-z_]+)\)/g;
      const codeLocDirectRe = /loc\("((?:[^"\\]|\\.)*)":(\d+):(\d+)\)/g;
      const lineToSourceLines = new Map();
      const lineToSourceLocs = new Map();
      const sourceLineToCodeLines = new Map();
      const lineToDefinedVars = new Map();
      const lineToUsedVars = new Map();
      const varToDefLine = new Map();

      function makeLocLabel(file, line, col) {
        const safeFile = typeof file === "string" && file.length > 0 ? file : "<unknown-file>";
        const safeLine = Number.isFinite(line) ? line : "?";
        const safeCol = Number.isFinite(col) ? col : "?";
        return `${safeFile}:${safeLine}:${safeCol}`;
      }

      function resolveLocLabels(locId, visiting = new Set()) {
        if (!locId || visiting.has(locId)) {
          return new Set();
        }
        visiting.add(locId);
        const def = defs.get(locId);
        if (!def) {
          return new Set();
        }
        if (def.type === "direct") {
          return new Set([makeLocLabel(def.file, def.line, def.col)]);
        }
        if (def.type === "unknown") {
          return new Set();
        }
        const out = new Set();
        for (const ref of def.refs || []) {
          const child = resolveLocLabels(ref, new Set(visiting));
          for (const label of child) {
            out.add(label);
          }
        }
        return out;
      }

      function normalizeDefToken(token) {
        const t = token.trim();
        const m = t.match(/^(%[-A-Za-z0-9.$_]+)(?::\d+)?$/);
        return m ? m[1] : null;
      }

      function parseDefinedVars(line) {
        const eqIdx = line.indexOf("=");
        if (eqIdx <= 0) {
          return [];
        }
        const lhs = line.slice(0, eqIdx).trim();
        if (!lhs.startsWith("%")) {
          return [];
        }
        if (lhs.includes(",")) {
          return lhs
            .split(",")
            .map((v) => normalizeDefToken(v))
            .filter((v) => typeof v === "string");
        }
        const one = normalizeDefToken(lhs);
        return one ? [one] : [];
      }

      function parseUsedVars(line) {
        const out = new Set();
        const useRe = /%[-A-Za-z0-9.$_]+(?:#[0-9]+)?/g;
        let m;
        useRe.lastIndex = 0;
        while ((m = useRe.exec(line)) !== null) {
          out.add(m[0]);
        }
        return out;
      }

      lines.forEach((line, idx) => {
        const codeLineNo = idx + 1;
        let rm;
        const srcLines = new Set();
        const srcLocs = new Set();
        codeLocRefRe.lastIndex = 0;
        while ((rm = codeLocRefRe.exec(line)) !== null) {
          const locId = rm[1];
          const resolved = resolveLocLines(locId);
          for (const s of resolved) {
            srcLines.add(s);
          }
          const resolvedLabels = resolveLocLabels(locId);
          for (const label of resolvedLabels) {
            srcLocs.add(label);
          }
        }
        codeLocDirectRe.lastIndex = 0;
        while ((rm = codeLocDirectRe.exec(line)) !== null) {
          const srcFile = rm[1];
          const srcLine = Number(rm[2]);
          const srcCol = Number(rm[3]);
          if (Number.isFinite(srcLine)) {
            srcLines.add(srcLine);
          }
          srcLocs.add(makeLocLabel(srcFile, srcLine, srcCol));
        }
        lineToSourceLines.set(codeLineNo, srcLines);
        lineToSourceLocs.set(codeLineNo, srcLocs);
        for (const srcLineNo of srcLines) {
          if (!sourceLineToCodeLines.has(srcLineNo)) {
            sourceLineToCodeLines.set(srcLineNo, new Set());
          }
          sourceLineToCodeLines.get(srcLineNo).add(codeLineNo);
        }

        lineToDefinedVars.set(codeLineNo, parseDefinedVars(line));
        lineToUsedVars.set(codeLineNo, parseUsedVars(line));
        const defs = lineToDefinedVars.get(codeLineNo) || [];
        for (const defVar of defs) {
          if (!varToDefLine.has(defVar)) {
            varToDefLine.set(defVar, codeLineNo);
          }
        }
      });

      return {
        lines,
        lineToSourceLines,
        lineToSourceLocs,
        sourceLineToCodeLines,
        lineToDefinedVars,
        lineToUsedVars,
        varToDefLine,
      };
    }

    function setTooltipPosition(clientX, clientY) {
      const offset = 14;
      const rect = locTooltip.getBoundingClientRect();
      const maxLeft = window.innerWidth - rect.width - 8;
      const maxTop = window.innerHeight - rect.height - 8;
      const left = Math.max(8, Math.min(clientX + offset, maxLeft));
      const top = Math.max(8, Math.min(clientY + offset, maxTop));
      locTooltip.style.left = `${left}px`;
      locTooltip.style.top = `${top}px`;
    }

    function showLocTooltip(parsed, lineNo, clientX, clientY) {
      if (!parsed || !locTooltip) {
        return;
      }
      const locs = parsed.lineToSourceLocs?.get(lineNo) || new Set();
      if (locs.size === 0) {
        locTooltip.style.display = "none";
        return;
      }
      const sorted = Array.from(locs).sort((a, b) => a.localeCompare(b));
      locTooltip.innerHTML = sorted.map((s) => escapeHtml(s)).join("<br>");
      locTooltip.style.display = "block";
      setTooltipPosition(clientX, clientY);
    }

    function hideLocTooltip() {
      if (locTooltip) {
        locTooltip.style.display = "none";
      }
    }

    function renderPane(container, parsed, side, peerParsed) {
      container.innerHTML = "";
      if (!parsed) {
        return;
      }
      const frag = document.createDocumentFragment();

      parsed.lines.forEach((code, idx) => {
        const codeLineNo = idx + 1;
        const row = document.createElement("div");
        row.className = "line";
        row.dataset.side = side;
        row.dataset.lineNo = String(codeLineNo);

        const no = document.createElement("span");
        no.className = "line-no";
        no.textContent = String(codeLineNo);

        const text = document.createElement("span");
        text.className = "line-code";
        text.innerHTML = syntaxHighlightMlirLine(code);

        row.appendChild(no);
        row.appendChild(text);
        frag.appendChild(row);

        row.addEventListener("mouseenter", (ev) => onHoverLine(ev, side, codeLineNo, parsed, peerParsed));
        row.addEventListener("mousemove", (ev) => showLocTooltip(parsed, codeLineNo, ev.clientX, ev.clientY));
        row.addEventListener("click", () => onClickLine(side, codeLineNo, parsed, peerParsed));
      });

      container.appendChild(frag);
      container.addEventListener("mouseleave", clearHover);
    }

    function onHoverLine(event, side, lineNo, parsed, peerParsed) {
      showLocTooltip(parsed, lineNo, event.clientX, event.clientY);
      if (state.locked) {
        return;
      }
      state.hover = buildHighlightState(side, lineNo, parsed, peerParsed);
      applyHighlight();
    }

    function onClickLine(side, lineNo, parsed, peerParsed) {
      if (state.locked && state.locked.side === side && state.locked.lineNo === lineNo) {
        state.locked = null;
        state.hover = null;
        applyHighlight();
        setStatus("已取消锁定，恢复悬停联动。");
        return;
      }

      state.locked = buildHighlightState(side, lineNo, parsed, peerParsed);
      state.hover = null;
      applyHighlight();
      autoScrollToRightFirstMatch(side, state.locked.ownPrimaryLineNo, state.locked.peerLineSet);
      setStatus("已锁定当前高亮；再次点击同一行可取消锁定。");
    }

    function clearHover() {
      hideLocTooltip();
      if (state.locked) {
        return;
      }
      state.hover = null;
      applyHighlight();
    }

    function applyHighlight() {
      document.querySelectorAll(".line").forEach((el) => {
        el.classList.remove("active", "peer-active", "var-ref-active");
      });
      const source = state.locked || state.hover;
      if (!source) {
        return;
      }

      const { side, ownPrimaryLineNo, peerLineSet, sameFileRefLines, peerVarRefLines } = source;
      const ownSelector = `.line[data-side="${side}"][data-line-no="${ownPrimaryLineNo}"]`;
      const own = document.querySelector(ownSelector);
      if (own) {
        own.classList.add("active");
      }

      if (sameFileRefLines && sameFileRefLines.size > 0) {
        sameFileRefLines.forEach((ln) => {
          if (ln === ownPrimaryLineNo) {
            return;
          }
          const refSelector = `.line[data-side="${side}"][data-line-no="${ln}"]`;
          const refLine = document.querySelector(refSelector);
          if (refLine) {
            refLine.classList.add("var-ref-active");
          }
        });
      }

      const peerSide = side === "left" ? "right" : "left";
      peerLineSet.forEach((ln) => {
        const peerSelector = `.line[data-side="${peerSide}"][data-line-no="${ln}"]`;
        const peer = document.querySelector(peerSelector);
        if (peer) {
          peer.classList.add("peer-active");
        }
      });

      if (peerVarRefLines && peerVarRefLines.size > 0) {
        peerVarRefLines.forEach((ln) => {
          const peerSelector = `.line[data-side="${peerSide}"][data-line-no="${ln}"]`;
          const peer = document.querySelector(peerSelector);
          if (peer) {
            peer.classList.add("var-ref-active");
          }
        });
      }
    }

    function collectSameFileRefLines(parsed, lineNo) {
      if (!parsed) {
        return new Set();
      }
      const defs = parsed.lineToDefinedVars.get(lineNo) || [];
      return collectVarRefLinesForDefs(parsed, defs, new Set([lineNo]));
    }

    function collectImmediateChildLines(parsed, lineNo, excludedLines = new Set()) {
      if (!parsed) {
        return new Set();
      }
      const defs = parsed.lineToDefinedVars.get(lineNo) || [];
      return collectVarRefLinesForDefs(parsed, defs, excludedLines);
    }

    function collectVarRefLinesForDefs(parsed, defs, excludedLines = new Set()) {
      const out = new Set();
      if (!parsed || !defs || defs.length === 0) {
        return out;
      }

      parsed.lines.forEach((_, idx) => {
        const ln = idx + 1;
        if (excludedLines.has(ln)) {
          return;
        }
        const used = parsed.lineToUsedVars.get(ln);
        if (!used || used.size === 0) {
          return;
        }
        for (const defVar of defs) {
          let hit = false;
          for (const useVar of used) {
            if (useVar === defVar || useVar.startsWith(defVar + "#")) {
              hit = true;
              break;
            }
          }
          if (hit) {
            out.add(ln);
            break;
          }
        }
      });
      return out;
    }

    function getPeerMatchesForLine(lineNo, parsed, peerParsed) {
      const peerLineSet = new Set();
      if (!parsed || !peerParsed) {
        return peerLineSet;
      }
      const srcLineSet = parsed.lineToSourceLines.get(lineNo) || new Set();
      for (const srcLineNo of srcLineSet) {
        const peerCodeLines = peerParsed.sourceLineToCodeLines.get(srcLineNo);
        if (!peerCodeLines) {
          continue;
        }
        for (const ln of peerCodeLines) {
          peerLineSet.add(ln);
        }
      }
      return peerLineSet;
    }

    function normalizeUseVar(useVar) {
      if (typeof useVar !== "string") {
        return "";
      }
      return useVar.replace(/#[0-9]+$/, "");
    }

    function collectParentChainNoLocLines(parsed, peerParsed, startLineNo) {
      const out = new Set();
      if (!parsed || !peerParsed) {
        return out;
      }

      const visited = new Set([startLineNo]);
      const queue = [startLineNo];

      while (queue.length > 0) {
        const currentLineNo = queue.shift();
        const used = parsed.lineToUsedVars.get(currentLineNo) || new Set();
        const parentSet = new Set();

        for (const useVar of used) {
          const baseVar = normalizeUseVar(useVar);
          if (!baseVar) {
            continue;
          }
          const defLineNo = parsed.varToDefLine.get(baseVar);
          if (typeof defLineNo !== "number" || defLineNo === currentLineNo) {
            continue;
          }
          parentSet.add(defLineNo);
        }

        const parents = Array.from(parentSet).sort((a, b) => a - b);
        for (const parentLineNo of parents) {
          if (visited.has(parentLineNo)) {
            continue;
          }
          visited.add(parentLineNo);
          queue.push(parentLineNo);
          if (getPeerMatchesForLine(parentLineNo, parsed, peerParsed).size === 0) {
            out.add(parentLineNo);
          }
        }
      }

      return out;
    }

    function findFallbackChainToPeer(parsed, peerParsed, startLineNo) {
      if (!parsed || !peerParsed) {
        return null;
      }
      const visited = new Set([startLineNo]);
      const queue = [{ lineNo: startLineNo, path: [startLineNo] }];

      while (queue.length > 0) {
        const current = queue.shift();
        const defs = parsed.lineToDefinedVars.get(current.lineNo) || [];
        const nextLineSet = collectVarRefLinesForDefs(parsed, defs, new Set(current.path));
        const nextLines = Array.from(nextLineSet).sort((a, b) => a - b);

        for (const nextLineNo of nextLines) {
          if (visited.has(nextLineNo)) {
            continue;
          }
          visited.add(nextLineNo);
          const nextPath = current.path.concat(nextLineNo);
          const nextPeerMatches = getPeerMatchesForLine(nextLineNo, parsed, peerParsed);
          if (nextPeerMatches.size > 0) {
            return {
              pathLines: nextPath,
              matchedLineNo: nextLineNo,
              peerLineSet: nextPeerMatches,
            };
          }
          queue.push({ lineNo: nextLineNo, path: nextPath });
        }
      }
      return null;
    }

    function buildHighlightState(side, lineNo, parsed, peerParsed) {
      const srcLineSet = parsed.lineToSourceLines.get(lineNo) || new Set();
      const sameFileRefLines = new Set();
      const peerLineSet = getPeerMatchesForLine(lineNo, parsed, peerParsed);
      const peerVarRefLines = new Set();
      let ownPrimaryLineNo = lineNo;

      if (peerParsed && peerLineSet.size === 0) {
        const fallback = findFallbackChainToPeer(parsed, peerParsed, lineNo);
        if (fallback) {
          for (const ln of fallback.peerLineSet) {
            peerLineSet.add(ln);
          }
          for (const ln of fallback.pathLines) {
            sameFileRefLines.add(ln);
          }
          if (typeof fallback.matchedLineNo === "number") {
            ownPrimaryLineNo = fallback.matchedLineNo;
          }
        }
      }

      if (peerLineSet.size > 0) {
        // 命中语句的直接 user 语句全部高亮。
        const childLines = collectImmediateChildLines(parsed, ownPrimaryLineNo, new Set([ownPrimaryLineNo]));
        for (const childLine of childLines) {
          sameFileRefLines.add(childLine);
        }

        // 命中语句的全部 parent 链路中，无 loc 命中的语句全部高亮。
        const parentNoLocLines = collectParentChainNoLocLines(parsed, peerParsed, ownPrimaryLineNo);
        for (const ln of parentNoLocLines) {
          sameFileRefLines.add(ln);
        }
      }

      if (peerParsed && peerLineSet.size > 0) {
        // 对侧仅定义 1 个 result 的匹配行，额外高亮其引用行。
        for (const peerLineNo of peerLineSet) {
          const defs = peerParsed.lineToDefinedVars.get(peerLineNo) || [];
          if (defs.length !== 1) {
            continue;
          }
          const refs = collectVarRefLinesForDefs(peerParsed, defs, peerLineSet);
          for (const ln of refs) {
            peerVarRefLines.add(ln);
          }
        }
      }

      return {
        side,
        lineNo,
        ownPrimaryLineNo,
        srcLineSet,
        peerLineSet,
        sameFileRefLines,
        peerVarRefLines,
      };
    }

    function autoScrollToRightFirstMatch(side, lineNo, peerLineSet) {
      if (!state.rightData) {
        return;
      }

      const rightMatches = new Set();
      if (side !== "right" && peerLineSet && peerLineSet.size > 0) {
        for (const ln of peerLineSet) {
          rightMatches.add(ln);
        }
      }

      if (side === "right") {
        rightMatches.add(lineNo);
      }

      if (rightMatches.size === 0) {
        return;
      }

      const first = Math.min(...rightMatches);
      const target = rightViewer.querySelector(`.line[data-side="right"][data-line-no="${first}"]`);
      if (target) {
        target.scrollIntoView({ behavior: "smooth", block: "center", inline: "nearest" });
      }
    }
  </script>
</body>
</html>
